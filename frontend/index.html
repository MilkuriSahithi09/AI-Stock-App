<!DOCTYPE html>
<html>
<head>
    <title>AI Stock News</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        .bullish { color: lime; }
        .bearish { color: red; }
    </style>
</head>

<body>

<h1>AI Stock News</h1>

<input id="query" placeholder="Search Tesla..." />
<button onclick="search()">Search</button>

<div id="results"></div>

<script>
async function search() {

    const query = document.getElementById("query").value.trim();

    if (!query) {
        alert("Enter something");
        return;
    }

    try {
        const res = await fetch(`https://ai-stock-app-uvqa.onrender.com/search?query=${encodeURIComponent(query)}`);

        if (!res.ok) {
            throw new Error("API error");
        }

        const data = await res.json();

        const div = document.getElementById("results");
        div.innerHTML = "";

        data.results.forEach(item => {

            const card = document.createElement("div");
            card.className = "card";

            card.onclick = () => window.open(item.url, "_blank");

            const sentimentClass =
                item.sentiment === "Bullish" ? "bullish" :
                item.sentiment === "Bearish" ? "bearish" : "";

            card.innerHTML = `
                <h3>${item.title}</h3>
                <p>${item.description}</p>
                <p>${item.source}</p>
                <p class="${sentimentClass}">${item.sentiment}</p>
            `;

            div.appendChild(card);
        });

    } catch (err) {
        alert("Error loading data");
        console.error(err);
    }
}
</script>

</body>
</html>
