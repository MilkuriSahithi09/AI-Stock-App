<!DOCTYPE html>
<html>
<head>
    <title>AI Stock News</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-top: 30px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 8px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .container {
            margin-top: 30px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.02);
            transition: 0.2s;
        }

        .bullish {
            color: lime;
            font-weight: bold;
        }

        .bearish {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>AI Stock News</h1>

    <input id="query" placeholder="Search (Tesla, Apple...)" />
    <button onclick="search()">Search</button>

    <div id="results" class="container"></div>

    <script>
        async function search() {

            const query = document.getElementById("query").value;

            const res = await fetch(`http://127.0.0.1:8000/search?query=${query}`);
            const data = await res.json();

            const resultsDiv = document.getElementById("results");
            resultsDiv.innerHTML = "";

            data.results.forEach(item => {

                const div = document.createElement("div");
                div.className = "card";

                div.onclick = () => {
                    window.open(item.url, "_blank");
                };

                const sentimentClass = item.sentiment === "Bullish" ? "bullish" : "bearish";

                div.innerHTML = `
                    <h3>${item.title}</h3>

                    <p>${item.description || ""}</p>

                    <p>${item.source}</p>

                    <p class="${sentimentClass}">
                        ${item.sentiment}
                    </p>
                `;

                resultsDiv.appendChild(div);
            });
        }
    </script>

</body>
</html>
